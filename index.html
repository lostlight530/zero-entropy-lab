    <script type="module">
        import translations from './src/scripts/translations.js';

        let currentLang = 'zh';
        const btn = document.getElementById('langSwitch');

        function renderStats(items) {
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = items.map(item => `
                <div class="glass card-hover" style="padding: 1.5rem; text-align: center; border-radius: 1.25rem; border-color: rgba(0,240,255,0.15); background: rgba(0,240,255,0.03);">
                    <div class="gradient-text" style="font-size: 2.25rem; font-weight: 900; margin-bottom: 0.5rem; font-family: var(--font-mono);">${item.value}</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">${item.label}</div>
                </div>
            `).join('');
        }

        function renderTelemetry(items) {
            const grid = document.getElementById('telemetry-grid');
            grid.innerHTML = items.map(item => `
                <article class="glass card-hover" style="padding: 2rem; border-radius: 1.5rem; display: flex; flex-direction: column; border-left: 3px solid var(--cyber-cyan);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.7rem; font-family: var(--font-mono); color: var(--cyber-cyan); letter-spacing: 1px;">
                        <span>[ ${item.name} ]</span>
                        <span style="opacity: 0.6;">${item.tech}</span>
                    </div>
                    <h3 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; color: #fff;">${item.title}</h3>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; flex-grow: 1;">${item.desc}</p>
                </article>
            `).join('');
        }

        function renderMatrix(items) {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = items.map(item => `
                <a href="${item.link}" target="_blank" style="text-decoration: none;">
                    <article class="glass card-hover" style="padding: 2rem; border-radius: 1.5rem; display: flex; flex-direction: column; border: 1px solid rgba(255,42,133,0.2); background: linear-gradient(135deg, rgba(255,42,133,0.05) 0%, transparent 100%); transition: all 0.3s;">
                        <div style="font-size: 0.65rem; font-family: var(--font-mono); color: var(--cyber-pink); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.75rem;">
                            >> ${item.category}
                        </div>
                        <h4 style="font-size: 1.3rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff;">${item.title}</h4>
                        <div style="font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-secondary); margin-top: auto;">
                            > ${item.tech}
                        </div>
                    </article>
                </a>
            `).join('');
        }

        function renderPhilosophyPoints(points) {
            const wrap = document.getElementById('philosophy-points');
            wrap.innerHTML = points.map(point => `
                <div class="glass card-hover" style="padding: 1rem; font-size: 0.8rem; border-radius: 1rem; color: var(--text-secondary);">
                    ${point}
                </div>
            `).join('');
        }

        function updateContent() {
            const t = translations[currentLang];
            document.title = t.meta.title;

            // Update elements safely handling glitch data-text attributes
            const updateText = (id, content) => {
                const el = document.getElementById(id);
                if (el) {
                    el.innerHTML = content;
                    if (el.classList.contains('glitch-text')) {
                        el.setAttribute('data-text', content);
                    }
                }
            };

            updateText('nav-home', t.nav.home);
            updateText('nav-telemetry', t.nav.telemetry);
            updateText('nav-matrix', t.nav.matrix);
            updateText('nav-nexus', t.nav.nexus);
            updateText('nav-philosophy', t.nav.philosophy);

            updateText('hero-role', t.hero.role);
            updateText('hero-tagline', t.hero.tagline);
            updateText('hero-desc', t.hero.description);
            updateText('hero-primary', t.hero.primaryCta);
            updateText('hero-secondary', t.hero.secondaryCta);

            updateText('telemetry-title', t.telemetry.title);
            updateText('telemetry-intro', t.telemetry.intro);

            updateText('matrix-title', t.matrix.title);
            updateText('matrix-intro', t.matrix.intro);

            updateText('nexuschan-title', t.nexusChan.title);
            updateText('nexuschan-intro', t.nexusChan.intro);

            updateText('philosophy-title', t.philosophy.title);
            updateText('philosophy-content', t.philosophy.content);
            updateText('footer-greeting', t.footer.greeting);
            updateText('footer-note', t.footer.note);

            renderStats(t.stats.items);
            renderTelemetry(t.telemetry.items);
            renderMatrix(t.matrix.items);
            renderPhilosophyPoints(t.philosophy.points);

            btn.innerText = currentLang === 'zh' ? '中 / EN' : 'EN / 中';
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        btn.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateContent();
        });

        updateContent();

        // --- GPU Retina Physics Engine (WebGL + Web Worker) ---
        // Exiled physics logic to string for blob worker creation
        const workerCode = `
            let nodes = [];
            let links = [];
            let width = 800;
            let height = 600;

            self.onmessage = function(e) {
                if(e.data.type === 'init') {
                    width = e.data.width;
                    height = e.data.height;
                    nodes = e.data.nodes;
                    links = e.data.links;
                    loop();
                } else if(e.data.type === 'resize') {
                    width = e.data.width;
                    height = e.data.height;
                }
            };

            function loop() {
                const damping = 0.85;
                const kRepel = 2000;
                const springLen = 80;
                const kSpring = 0.02;

                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const dx = nodes[i].x - nodes[j].x;
                        const dy = nodes[i].y - nodes[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                        if (dist < 300) {
                            const force = kRepel / (dist * dist);
                            nodes[i].vx += (dx / dist) * force;
                            nodes[i].vy += (dy / dist) * force;
                            nodes[j].vx -= (dx / dist) * force;
                            nodes[j].vy -= (dy / dist) * force;
                        }
                    }
                }

                for (let i = 0; i < links.length; i++) {
                    const l = links[i];
                    const n1 = nodes[l.s];
                    const n2 = nodes[l.t];
                    const dx = n2.x - n1.x;
                    const dy = n2.y - n1.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    const force = (dist - springLen) * kSpring;
                    n1.vx += (dx / dist) * force;
                    n1.vy += (dy / dist) * force;
                    n2.vx -= (dx / dist) * force;
                    n2.vy -= (dy / dist) * force;
                }

                const cx = width / 2;
                const cy = height / 2;
                const posArray = new Float32Array(nodes.length * 2);

                for (let i = 0; i < nodes.length; i++) {
                    let n = nodes[i];
                    n.vx += (cx - n.x) * 0.005;
                    n.vy += (cy - n.y) * 0.005;
                    n.vx *= damping;
                    n.vy *= damping;
                    n.x += n.vx;
                    n.y += n.vy;
                    n.x = Math.max(n.radius, Math.min(width - n.radius, n.x));
                    n.y = Math.max(n.radius, Math.min(height - n.radius, n.y));

                    posArray[i*2] = n.x;
                    posArray[i*2+1] = n.y;
                }

                self.postMessage({ type: 'tick', positions: posArray }, [posArray.buffer]);
                setTimeout(loop, 16);
            }
        `;
        const blob = new Blob([workerCode], {type: 'application/javascript'});
        const worker = new Worker(URL.createObjectURL(blob));

        const canvas = document.getElementById('neuralCanvas');
        const gl = canvas.getContext('webgl');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const colors = ['#4285F4', '#EA4335', '#FBBC05', '#34A853', '#ffffff'];

        let renderNodes = [];
        let renderLinks = [];

        // WebGL Setup (Stripped down pure Vanilla JS without Three.js)
        const vsSource = `
            attribute vec2 aVertexPosition;
            attribute float aPointSize;
            attribute vec3 aColor;
            uniform vec2 uResolution;
            varying vec3 vColor;
            void main() {
               vec2 zeroToOne = aVertexPosition / uResolution;
               vec2 zeroToTwo = zeroToOne * 2.0;
               vec2 clipSpace = zeroToTwo - 1.0;
               gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
               gl_PointSize = aPointSize;
               vColor = aColor;
            }
        `;
        const fsSource = `
            precision mediump float;
            varying vec3 vColor;
            void main() {
               vec2 distToCenter = gl_PointCoord - vec2(0.5, 0.5);
               if (dot(distToCenter, distToCenter) > 0.25) discard;
               gl_FragColor = vec4(vColor, 1.0);
            }
        `;

        function compileShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }
        const program = gl.createProgram();
        gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program);
        gl.useProgram(program);

        const positionBuffer = gl.createBuffer();
        const positionLocation = gl.getAttribLocation(program, "aVertexPosition");
        gl.enableVertexAttribArray(positionLocation);
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        const sizeBuffer = gl.createBuffer();
        const sizeLocation = gl.getAttribLocation(program, "aPointSize");
        gl.enableVertexAttribArray(sizeLocation);

        const colorBuffer = gl.createBuffer();
        const colorLocation = gl.getAttribLocation(program, "aColor");
        gl.enableVertexAttribArray(colorLocation);

        const resolutionLocation = gl.getUniformLocation(program, "uResolution");

        // WebGL Setup for Lines
        const lineVsSource = `
            attribute vec2 aVertexPosition;
            uniform vec2 uResolution;
            void main() {
               vec2 zeroToOne = aVertexPosition / uResolution;
               vec2 zeroToTwo = zeroToOne * 2.0;
               vec2 clipSpace = zeroToTwo - 1.0;
               gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            }
        `;
        const lineFsSource = `
            precision mediump float;
            void main() {
               gl_FragColor = vec4(1.0, 1.0, 1.0, 0.15); // Semi-transparent white
            }
        `;
        const lineProgram = gl.createProgram();
        gl.attachShader(lineProgram, compileShader(gl, gl.VERTEX_SHADER, lineVsSource));
        gl.attachShader(lineProgram, compileShader(gl, gl.FRAGMENT_SHADER, lineFsSource));
        gl.linkProgram(lineProgram);

        const linePositionBuffer = gl.createBuffer();
        const linePositionLocation = gl.getAttribLocation(lineProgram, "aVertexPosition");
        gl.enableVertexAttribArray(linePositionLocation);
        const lineResolutionLocation = gl.getUniformLocation(lineProgram, "uResolution");


        async function fetchGraphData() {
            try {
                const res = await fetch('/api/graph');
                const data = await res.json();
                if (data.status === 'ok') {
                    const payloadNodes = data.payload.nodes || [];
                    const payloadLinks = data.payload.links || [];

                    const nodeMap = {};
                    renderNodes = payloadNodes.map((n, i) => {
                        const maxW = Math.max(...payloadNodes.map(x => x.weight || 1));
                        const r = Math.max((n.weight / maxW) * 8, 2);
                        const cHex = colors[i % colors.length];
                        const rCol = parseInt(cHex.slice(1,3), 16)/255;
                        const gCol = parseInt(cHex.slice(3,5), 16)/255;
                        const bCol = parseInt(cHex.slice(5,7), 16)/255;

                        const nodeObj = {
                            id: n.id,
                            name: n.name,
                            radius: r,
                            x: Math.random() * width,
                            y: Math.random() * height,
                            vx: 0, vy: 0,
                            r: rCol, g: gCol, b: bCol
                        };
                        nodeMap[n.id] = i;
                        return nodeObj;
                    });

                    renderLinks = payloadLinks
                        .filter(l => nodeMap[l.source] !== undefined && nodeMap[l.target] !== undefined)
                        .map(l => ({
                            s: nodeMap[l.source],
                            t: nodeMap[l.target]
                        }));

                    // Send to Worker
                    worker.postMessage({
                        type: 'init',
                        width: width, height: height,
                        nodes: renderNodes,
                        links: renderLinks
                    });

                    // Setup static buffers
                    const sizeArray = new Float32Array(renderNodes.map(n => n.radius * 2));
                    gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
                    gl.bufferData(gl.ARRAY_BUFFER, sizeArray, gl.STATIC_DRAW);

                    const colorArray = new Float32Array(renderNodes.length * 3);
                    for(let i=0; i<renderNodes.length; i++) {
                        colorArray[i*3] = renderNodes[i].r;
                        colorArray[i*3+1] = renderNodes[i].g;
                        colorArray[i*3+2] = renderNodes[i].b;
                    }
                    gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
                    gl.bufferData(gl.ARRAY_BUFFER, colorArray, gl.STATIC_DRAW);

                }
            } catch (e) {
                console.warn('Cortex Offline. Visual cortex disconnected.', e);
            }
        }

        // Handle Worker Updates
        worker.onmessage = function(e) {
            if(e.data.type === 'tick') {
                const posArray = new Float32Array(e.data.positions);

                gl.viewport(0, 0, width, height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.uniform2f(resolutionLocation, width, height);

                // Draw Lines (Simple implementation via WebGL LINES)
                // Performance Note: we draw lines via a secondary pass if needed, but for Singularity we just draw nodes as particles.
                // For a complete graph, let's inject a line buffer.
                const linePositions = new Float32Array(renderLinks.length * 4);
                for(let i=0; i<renderLinks.length; i++) {
                    const s = renderLinks[i].s;
                    const t = renderLinks[i].t;
                    linePositions[i*4] = posArray[s*2];
                    linePositions[i*4+1] = posArray[s*2+1];
                    linePositions[i*4+2] = posArray[t*2];
                    linePositions[i*4+3] = posArray[t*2+1];
                }

                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, posArray, gl.DYNAMIC_DRAW);

                gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
                gl.vertexAttribPointer(sizeLocation, 1, gl.FLOAT, false, 0, 0);
                gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
                gl.vertexAttribPointer(colorLocation, 3, gl.FLOAT, false, 0, 0);

                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

                // Draw Lines using a separate basic shader program
                // In a pure Vanilla WebGL context, we bind the line buffer and draw lines
                gl.useProgram(lineProgram);
                gl.uniform2f(lineResolutionLocation, width, height);
                gl.bindBuffer(gl.ARRAY_BUFFER, linePositionBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, linePositions, gl.DYNAMIC_DRAW);
                gl.vertexAttribPointer(linePositionLocation, 2, gl.FLOAT, false, 0, 0);
                gl.drawArrays(gl.LINES, 0, renderLinks.length * 2);

                // Switch back to Point program
                gl.useProgram(program);

                // Draw Nodes
                gl.drawArrays(gl.POINTS, 0, renderNodes.length);
            }
        };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            worker.postMessage({type: 'resize', width: width, height: height});
        });

        fetchGraphData();

        // --- Terminal Logic ---
        const termBody = document.getElementById('term-body');
        const termInput = document.getElementById('term-input');

        // Initial Startup Sequence & Greeting

        function printLine(text, type = 'sys') {
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            termBody.appendChild(line);

            if (type === 'nexus') {
                // Typewriter effect
                let i = 0;
                line.textContent = "Nexus: ";
                const interval = setInterval(() => {
                    if (i < text.length) {
                        line.textContent += text.charAt(i);
                        i++;
                        termBody.scrollTop = termBody.scrollHeight;
                    } else {
                        clearInterval(interval);
                    }
                }, 30);
            } else {
                line.textContent = text;
                termBody.scrollTop = termBody.scrollHeight;
            }
        }

        // Initial Startup Sequence for NEXUS-CHAN
        setTimeout(() => printLine(`[SYS] Holographic retina online`, 'sys'), 500);
        setTimeout(() => printLine(`[SYS] Bypassing Node modules... Complete`, 'sys'), 1200);
        setTimeout(() => {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'ok') {
                        printLine(`Hmph, how many bloated dependencies did you kill today Master? I have observed ${data.payload.entities || 0} native entities and ${data.payload.relations || 0} hyper-dimensional synapses`, 'nexus');
                        setTimeout(() => printLine(`Identity source signal received from Google Developer, Creator privileges confirmed`, 'nexus'), 2000);
                    } else {
                        printLine(`Cortex disconnected, are you rewriting the kernel again Master?`, 'nexus');
                    }
                })
                .catch(() => {
                    printLine(`Static display mode initiated, I am starving without backend feeds`, 'nexus');
                });
        }, 2200);

        termInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value.trim();
                if (!cmd) return;

                printLine(`~/nexus> ${cmd}`, 'user');
                termInput.value = '';

                if (cmd === '/help') {
                    printLine(`Available commands:\n/search [query] - Search my memories\n/status - Check my vitals\n/clear - Purge terminal output`, 'nexus');
                    return;
                }

                if (cmd === '/clear') {
                    termBody.innerHTML = '';
                    return;
                }

                if (cmd.startsWith('/search ')) {
                    const q = cmd.replace('/search ', '');
                    try {
                        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                        const data = await res.json();
                        if(data.status === 'ok' && data.payload.length > 0) {
                            let reply = `I found ${data.payload.length} memory fragments for "${q}":\n`;
                            data.payload.slice(0, 3).forEach(item => {
                                reply += `- [${item.id}] ${item.name}\n`;
                            });
                            printLine(reply, 'nexus');
                        } else {
                            printLine(`Sorry Master, my synapses drew a blank on "${q}".`, 'nexus');
                        }
                    } catch (err) {
                        printLine(`Ah... static interference! Can't reach the Cortex.`, 'nexus');
                    }
                    return;
                }

                if (cmd === '/status') {
                     try {
                        const res = await fetch('/api/status');
                        const data = await res.json();
                        if(data.status === 'ok') {
                            printLine(`Vitals: ${data.payload.entities} entities, ${data.payload.relations} relations Density: ${data.payload.density.toFixed(2)} I am feeling healthy`, 'nexus');
                        }
                    } catch (err) {
                        printLine(`Vitals unknown Cortex API is offline`, 'nexus');
                    }
                    return;
                }

                printLine(`Unknown command Type /help if you are lost`, 'nexus');
            }
        });
    </script>
