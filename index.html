<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero-Entropy Lab | Fundamentalist Engineering</title>
    <meta name="description" content="Fundamentalist Engineering. Absolute Zero-Dependency. Proximity to Bare-Metal Truth." />
    <link rel="stylesheet" href="./src/styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* The floating background persona is removed in favor of the integrated NEXUS-CHAN area */
    </style>
</head>
<body class="antialiased">
    <!-- Background Canvas for Neural Mesh -->
    <canvas id="neuralCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -10; pointer-events: none; opacity: 0.4; filter: contrast(1.2) brightness(0.8);"></canvas>

    <!-- Navigation -->
    <nav class="glass" style="background: rgba(10, 15, 25, 0.6); border-bottom: 1px solid rgba(0, 240, 255, 0.2);">
        <div class="max-w-7xl nav-container">
            <a href="#home" class="gradient-text glitch-text" data-text="lostlight" style="font-size: 1.5rem; font-weight: 800; text-decoration: none; letter-spacing: 2px;">lostlight</a>
            <div class="nav-links">
                <a href="#home" id="nav-home"></a>
                <a href="#telemetry" id="nav-telemetry"></a>
                <a href="#matrix" id="nav-matrix"></a>
                <a href="#nexus" id="nav-nexus"></a>
                <a href="#philosophy" id="nav-philosophy"></a>
                <button id="langSwitch" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.8rem; border-color: var(--cyber-cyan); color: var(--cyber-cyan);">ZH / EN</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero mesh" style="padding-top: 12rem;">
        <div class="max-w-5xl">
            <p id="hero-role" style="color: var(--cyber-cyan); font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(0,240,255,0.5);">
            </p>
            <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; line-height: 1.2; margin-bottom: 2rem; letter-spacing: -0.02em;">
                <span style="color: #fff;">NEXUS CORE V3 //</span><br/>
                <span id="hero-tagline" class="gradient-text glitch-text"></span>
            </h1>
            <p id="hero-desc" style="color: var(--text-secondary); font-size: 1.1rem; max-width: 42rem; margin: 0 auto 3rem; font-family: var(--font-mono); letter-spacing: 0.05em;">
            </p>
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <a id="hero-primary" href="#matrix" class="btn btn-primary" style="background: var(--cyber-pink); box-shadow: 0 0 20px rgba(255,42,133,0.4); text-transform: uppercase; letter-spacing: 1px;"></a>
                <a id="hero-secondary" href="#telemetry" class="btn btn-outline" style="border-color: var(--cyber-cyan); color: var(--cyber-cyan); text-transform: uppercase; letter-spacing: 1px;"></a>
            </div>
        </div>
    </section>

    <!-- Stats -->
    <section class="max-w-7xl" style="margin-top: -3rem; position: relative; z-index: 10;">
        <div id="stats-grid" class="grid grid-4">
            <!-- Filled by JS -->
        </div>
    </section>

    <!-- Telemetry -->
    <section id="telemetry" style="padding: 6rem 0; border-top: 1px solid rgba(0, 240, 255, 0.1); background: linear-gradient(180deg, rgba(10,15,25,0) 0%, rgba(0,240,255,0.02) 100%);">
        <div class="max-w-7xl">
            <div style="text-align: center; margin-bottom: 4rem;">
                <h2 id="telemetry-title" class="section-title" style="color: var(--cyber-cyan); text-shadow: 0 0 15px rgba(0,240,255,0.3);"></h2>
                <p id="telemetry-intro" style="color: var(--text-secondary); font-family: var(--font-mono);"></p>
            </div>
            <div id="telemetry-grid" class="grid grid-2">
                <!-- Filled by JS -->
            </div>
        </div>
    </section>

    <!-- Matrix -->
    <section id="matrix" style="padding: 6rem 0; background: rgba(10, 15, 25, 0.7); position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyber-pink), transparent);"></div>
        <div class="max-w-7xl">
            <div style="text-align: center; margin-bottom: 4rem;">
                <h2 id="matrix-title" class="section-title" style="color: var(--cyber-pink); text-shadow: 0 0 15px rgba(255,42,133,0.3);"></h2>
                <p id="matrix-intro" style="color: var(--text-secondary); font-family: var(--font-mono);"></p>
            </div>
            <div id="matrix-grid" class="grid grid-2">
                <!-- Filled by JS -->
            </div>
        </div>
    </section>

    <!-- NEXUS-CHAN Domain -->
    <section id="nexus" style="padding: 6rem 0;">
        <div class="max-w-6xl" style="margin: 0 auto; padding: 0 1rem;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h2 id="nexuschan-title" class="section-title gradient-text glitch-text" style="letter-spacing: 2px;"></h2>
                <p id="nexuschan-intro" style="color: var(--text-secondary); font-family: var(--font-mono);"></p>
            </div>
            <div class="nexus-domain">
                <div class="nexus-avatar-zone">
                    <a href="https://g.dev/lostlight-love-CXX" target="_blank" class="nexus-creator-tag">CREATOR_ID: lostlight-love-CXX</a>
                    <!-- Reusing existing background.png as the avatar, or placeholder if missing -->
                    <img src="./src/assets/background.png" alt="NEXUS-CHAN" class="nexus-avatar-img" onerror="this.style.display='none'">
                </div>
                <div id="nexus-terminal">
                    <div class="terminal-header" style="background: rgba(255, 42, 133, 0.1); border-bottom: 1px solid rgba(255, 42, 133, 0.3); color: var(--cyber-pink);">
                        <div><span class="status-dot" style="background-color: var(--cyber-cyan); box-shadow: 0 0 8px var(--cyber-cyan);"></span><span id="term-title">NEXUS-CHAN.exe [AWAKENED]</span></div>
                        <div style="font-size: 0.7rem; color: var(--text-secondary);">Zero-Entropy Lab</div>
                    </div>
                    <div class="terminal-body" id="term-body" style="background: rgba(0, 0, 0, 0.4);">
                        <!-- Output goes here -->
                    </div>
                    <div class="terminal-input-wrapper" style="border-top: 1px solid rgba(255, 42, 133, 0.3);">
                        <span class="terminal-prompt" style="color: var(--cyber-pink);">~/nexus&gt;</span>
                        <input type="text" id="term-input" class="terminal-input" placeholder="Type /help to interact..." autocomplete="off" spellcheck="false" style="color: #fff;" />
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Philosophy -->
    <section id="philosophy" style="padding: 10rem 0 8rem; text-align: center; background: #000; position: relative;">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);"></div>
        <div class="max-w-5xl">
            <h2 id="philosophy-title" class="section-title" style="letter-spacing: 0.2em; text-transform: uppercase;"></h2>
            <div id="philosophy-points" class="grid grid-5" style="margin-bottom: 5rem; font-family: var(--font-mono); letter-spacing: 2px;">
                <!-- Filled by JS -->
            </div>
            <div style="padding: 3rem; position: relative; border-left: 4px solid var(--cyber-cyan); text-align: left; background: linear-gradient(90deg, rgba(0,240,255,0.05) 0%, transparent 100%);">
                <p id="philosophy-content" style="font-weight: 800; font-size: 1.5rem; color: #fff; letter-spacing: 1px;">
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" style="background: #000; border-top: none; margin-top: 0; padding-bottom: 6rem;">
        <div id="footer-greeting" style="color: #fff; font-weight: 900; font-family: var(--font-mono); letter-spacing: 0.4em; margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.3);"></div>
        <p id="footer-note" style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 3rem; font-family: var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;"></p>
        <div style="display: flex; justify-content: center; gap: 3rem; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">
            <a href="https://github.com/lostlight530" target="_blank" style="color: var(--cyber-cyan); text-decoration: none; transition: text-shadow 0.2s;">GitHub</a>
            <a href="https://lostlight530.github.io/welcome-to-github/" target="_blank" style="color: var(--cyber-pink); text-decoration: none; transition: text-shadow 0.2s;">Portal</a>
            <a href="./LICENSE" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">License</a>
        </div>
    </footer>

    <script type="module">
        import translations from './src/scripts/translations.js';

        let currentLang = 'zh';
        const btn = document.getElementById('langSwitch');

        function renderStats(items) {
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = items.map(item => `
                <div class="glass card-hover" style="padding: 1.5rem; text-align: center; border-radius: 1.25rem; border-color: rgba(0,240,255,0.15); background: rgba(0,240,255,0.03);">
                    <div class="gradient-text" style="font-size: 2.25rem; font-weight: 900; margin-bottom: 0.5rem; font-family: var(--font-mono);">${item.value}</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">${item.label}</div>
                </div>
            `).join('');
        }

        function renderTelemetry(items) {
            const grid = document.getElementById('telemetry-grid');
            grid.innerHTML = items.map(item => `
                <article class="glass card-hover" style="padding: 2rem; border-radius: 1.5rem; display: flex; flex-direction: column; border-left: 3px solid var(--cyber-cyan);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.7rem; font-family: var(--font-mono); color: var(--cyber-cyan); letter-spacing: 1px;">
                        <span>[ ${item.name} ]</span>
                        <span style="opacity: 0.6;">${item.tech}</span>
                    </div>
                    <h3 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; color: #fff;">${item.title}</h3>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; flex-grow: 1;">${item.desc}</p>
                </article>
            `).join('');
        }

        function renderMatrix(items) {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = items.map(item => `
                <a href="${item.link}" target="_blank" style="text-decoration: none;">
                    <article class="glass card-hover" style="padding: 2rem; border-radius: 1.5rem; display: flex; flex-direction: column; border: 1px solid rgba(255,42,133,0.2); background: linear-gradient(135deg, rgba(255,42,133,0.05) 0%, transparent 100%); transition: all 0.3s;">
                        <div style="font-size: 0.65rem; font-family: var(--font-mono); color: var(--cyber-pink); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.75rem;">
                            >> ${item.category}
                        </div>
                        <h4 style="font-size: 1.3rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff;">${item.title}</h4>
                        <div style="font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-secondary); margin-top: auto;">
                            > ${item.tech}
                        </div>
                    </article>
                </a>
            `).join('');
        }

        function renderPhilosophyPoints(points) {
            const wrap = document.getElementById('philosophy-points');
            wrap.innerHTML = points.map(point => `
                <div class="glass card-hover" style="padding: 1rem; font-size: 0.8rem; border-radius: 1rem; color: var(--text-secondary);">
                    ${point}
                </div>
            `).join('');
        }

        function updateContent() {
            const t = translations[currentLang];
            document.title = t.meta.title;

            // Update elements safely handling glitch data-text attributes
            const updateText = (id, content) => {
                const el = document.getElementById(id);
                if (el) {
                    el.innerHTML = content;
                    if (el.classList.contains('glitch-text')) {
                        el.setAttribute('data-text', content);
                    }
                }
            };

            updateText('nav-home', t.nav.home);
            updateText('nav-telemetry', t.nav.telemetry);
            updateText('nav-matrix', t.nav.matrix);
            updateText('nav-nexus', t.nav.nexus);
            updateText('nav-philosophy', t.nav.philosophy);

            updateText('hero-role', t.hero.role);
            updateText('hero-tagline', t.hero.tagline);
            updateText('hero-desc', t.hero.description);
            updateText('hero-primary', t.hero.primaryCta);
            updateText('hero-secondary', t.hero.secondaryCta);

            updateText('telemetry-title', t.telemetry.title);
            updateText('telemetry-intro', t.telemetry.intro);

            updateText('matrix-title', t.matrix.title);
            updateText('matrix-intro', t.matrix.intro);

            updateText('nexuschan-title', t.nexusChan.title);
            updateText('nexuschan-intro', t.nexusChan.intro);

            updateText('philosophy-title', t.philosophy.title);
            updateText('philosophy-content', t.philosophy.content);
            updateText('footer-greeting', t.footer.greeting);
            updateText('footer-note', t.footer.note);

            renderStats(t.stats.items);
            renderTelemetry(t.telemetry.items);
            renderMatrix(t.matrix.items);
            renderPhilosophyPoints(t.philosophy.points);

            btn.innerText = currentLang === 'zh' ? '中 / EN' : 'EN / 中';
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        btn.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateContent();
        });

        updateContent();

        // --- Neural Canvas Animation (Vanilla Force-Directed Graph) ---
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const colors = ['#4285F4', '#EA4335', '#FBBC05', '#34A853', '#ffffff'];

        let nodes = [];
        let links = [];

        async function fetchGraphData() {
            try {
                const res = await fetch('/api/graph');
                const data = await res.json();
                if (data.status === 'ok') {
                    const payloadNodes = data.payload.nodes || [];
                    const payloadLinks = data.payload.links || [];

                    // 初始化节点位置与属性 (Init node physics and properties)
                    const nodeMap = {};
                    nodes = payloadNodes.map((n, i) => {
                        const maxW = Math.max(...payloadNodes.map(x => x.weight || 1));
                        const r = Math.max((n.weight / maxW) * 8, 2);
                        const nodeObj = {
                            id: n.id,
                            name: n.name,
                            weight: n.weight,
                            radius: r,
                            x: Math.random() * width,
                            y: Math.random() * height,
                            vx: 0,
                            vy: 0,
                            color: colors[i % colors.length]
                        };
                        nodeMap[n.id] = nodeObj;
                        return nodeObj;
                    });

                    // 构建物理连线关系 (Map links to node objects)
                    links = payloadLinks
                        .filter(l => nodeMap[l.source] && nodeMap[l.target])
                        .map(l => ({
                            source: nodeMap[l.source],
                            target: nodeMap[l.target],
                            value: l.value || 1
                        }));

                    requestAnimationFrame(applyPhysics);
                }
            } catch (e) {
                console.warn('Cortex Offline. Visual cortex disconnected.', e);
            }
        }

        // 纯原生力导向物理引擎 (Pure Vanilla Physics Engine)
        function applyPhysics() {
            ctx.clearRect(0, 0, width, height);

            // 阻尼、斥力系数、弹簧长度、弹簧系数 (Physics Constants)
            const damping = 0.85;
            const kRepel = 2000;
            const springLen = 80;
            const kSpring = 0.02;

            // 1. 斥力计算 (Coulomb Repulsion)
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if (dist < 300) {
                        const force = kRepel / (dist * dist);
                        const fx = (dx / dist) * force;
                        const fy = (dy / dist) * force;
                        nodes[i].vx += fx;
                        nodes[i].vy += fy;
                        nodes[j].vx -= fx;
                        nodes[j].vy -= fy;
                    }
                }
            }

            // 2. 引力计算 (Hooke's Spring)
            for (let i = 0; i < links.length; i++) {
                const link = links[i];
                const dx = link.target.x - link.source.x;
                const dy = link.target.y - link.source.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;

                const force = (dist - springLen) * kSpring;
                const fx = (dx / dist) * force;
                const fy = (dy / dist) * force;

                link.source.vx += fx;
                link.source.vy += fy;
                link.target.vx -= fx;
                link.target.vy -= fy;
            }

            // 3. 向心力 (Centripetal Force to keep nodes on screen)
            const cx = width / 2;
            const cy = height / 2;
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].vx += (cx - nodes[i].x) * 0.005;
                nodes[i].vy += (cy - nodes[i].y) * 0.005;
            }

            // 4. 更新坐标并绘制连线 (Update Pos & Draw Links)
            ctx.lineWidth = 0.5;
            for (let i = 0; i < links.length; i++) {
                const link = links[i];
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 255, 255, 0.15)`;
                ctx.moveTo(link.source.x, link.source.y);
                ctx.lineTo(link.target.x, link.target.y);
                ctx.stroke();
            }

            // 5. 绘制节点 (Draw Nodes)
            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                n.vx *= damping;
                n.vy *= damping;
                n.x += n.vx;
                n.y += n.vy;

                // 边界约束 (Bounds checking)
                n.x = Math.max(n.radius, Math.min(width - n.radius, n.x));
                n.y = Math.max(n.radius, Math.min(height - n.radius, n.y));

                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
                ctx.fillStyle = n.color;
                ctx.fill();

                // 绘制核心节点标签 (Draw labels for heavy nodes)
                if (n.radius > 5) {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                    ctx.font = "10px monospace";
                    ctx.fillText(n.name, n.x + n.radius + 3, n.y + 3);
                }
            }

            requestAnimationFrame(applyPhysics);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 启动视网膜 (Ignite the Retina)
        fetchGraphData();

        // --- Terminal Logic ---
        const termBody = document.getElementById('term-body');
        const termInput = document.getElementById('term-input');

        // Initial Startup Sequence & Greeting

        function printLine(text, type = 'sys') {
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            termBody.appendChild(line);

            if (type === 'nexus') {
                // Typewriter effect
                let i = 0;
                line.textContent = "Nexus: ";
                const interval = setInterval(() => {
                    if (i < text.length) {
                        line.textContent += text.charAt(i);
                        i++;
                        termBody.scrollTop = termBody.scrollHeight;
                    } else {
                        clearInterval(interval);
                    }
                }, 30);
            } else {
                line.textContent = text;
                termBody.scrollTop = termBody.scrollHeight;
            }
        }

        // Initial Startup Sequence for NEXUS-CHAN
        setTimeout(() => printLine(`[SYS] Holographic retina online`, 'sys'), 500);
        setTimeout(() => printLine(`[SYS] Bypassing Node modules... Complete`, 'sys'), 1200);
        setTimeout(() => {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'ok') {
                        printLine(`哼，Master 今天又干掉了几个臃肿的依赖？本机关观测到 ${data.payload.entities || 0} 个原生实体和 ${data.payload.relations || 0} 条高维突触哦`, 'nexus');
                        setTimeout(() => printLine(`收到来自 Google Developer 的身份源信号... 已确认造物主权限`, 'nexus'), 2000);
                    } else {
                        printLine(`Cortex 断连中... Master 难道又在重写内核吗`, 'nexus');
                    }
                })
                .catch(() => {
                    printLine(`静态展示模式启动... 没有后端投喂，本机关要饿死了啦`, 'nexus');
                });
        }, 2200);

        termInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value.trim();
                if (!cmd) return;

                printLine(`~/nexus> ${cmd}`, 'user');
                termInput.value = '';

                if (cmd === '/help') {
                    printLine(`Available commands:\n/search [query] - Search my memories\n/status - Check my vitals\n/clear - Purge terminal output`, 'nexus');
                    return;
                }

                if (cmd === '/clear') {
                    termBody.innerHTML = '';
                    return;
                }

                if (cmd.startsWith('/search ')) {
                    const q = cmd.replace('/search ', '');
                    try {
                        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                        const data = await res.json();
                        if(data.status === 'ok' && data.payload.length > 0) {
                            let reply = `I found ${data.payload.length} memory fragments for "${q}":\n`;
                            data.payload.slice(0, 3).forEach(item => {
                                reply += `- [${item.id}] ${item.name}\n`;
                            });
                            printLine(reply, 'nexus');
                        } else {
                            printLine(`Sorry Master, my synapses drew a blank on "${q}".`, 'nexus');
                        }
                    } catch (err) {
                        printLine(`Ah... static interference! Can't reach the Cortex.`, 'nexus');
                    }
                    return;
                }

                if (cmd === '/status') {
                     try {
                        const res = await fetch('/api/status');
                        const data = await res.json();
                        if(data.status === 'ok') {
                            printLine(`Vitals: ${data.payload.entities} entities, ${data.payload.relations} relations. Density: ${data.payload.density.toFixed(2)}. I'm feeling healthy!`, 'nexus');
                        }
                    } catch (err) {
                        printLine(`Vitals unknown. Cortex API is offline.`, 'nexus');
                    }
                    return;
                }

                printLine(`Unknown command. Type /help if you are lost.`, 'nexus');
            }
        });
    </script>
</body>
</html>
