name: NEXUS CORTEX Life Cycle
on:
  schedule:
    - cron: '0 22 * * *'
  push:
    paths: ['.github/workflows/nexus-life-cycle.yml', 'data/inputs/**', 'data/knowledge/**', 'src/**', 'tests/**']
  workflow_dispatch:
concurrency:
  group: nexus-life-cycle-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false
env:
  GITHUB_DEPENDENCY_GRAPH_ENABLED: 'false'
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUTF8: '1'
jobs:
  consciousness:
    name: Stream of Consciousness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout Reality
        uses: actions/checkout@v5
        with:
          clean: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Validate Runtime Contracts
        run: |
          python -c "from pathlib import Path; files=sorted(Path('src/kernel').rglob('*.py')) + sorted(Path('tests').glob('*.py')); [compile(path.read_bytes(), str(path), 'exec') for path in files]; print(f'compiled {len(files)} backend Python files')"
          python tests/run_tests.py
      - name: Validate Existing Ledgers
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import maintain_jsonl; print(maintain_jsonl('data/knowledge'))"
      - name: Harvest Approved External Documents
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/kernel/protocol/nexus.py harvest
      - name: Project External Evidence
        run: python src/kernel/protocol/nexus.py project
      - name: Canonicalize Active Ledgers
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import canonicalize_ledger; print(canonicalize_ledger('data/knowledge', hash_chain=True))"
      - name: Remove Protected Sources from Active Graph
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import prune_generated_paths; print(prune_generated_paths('data/knowledge', ('aegis-cortex', 'ballast', 'index.html', 'src/assets', 'src/scripts', 'src/styles'), hash_chain=True))"
      - name: Rebuild Memory
        run: python src/kernel/protocol/nexus.py rebuild
      - name: Ingest Self-Codebase
        run: python src/kernel/protocol/nexus.py ingest
      - name: Re-prune Protected Sources
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import prune_generated_paths; print(prune_generated_paths('data/knowledge', ('aegis-cortex', 'ballast', 'index.html', 'src/assets', 'src/scripts', 'src/styles'), hash_chain=True))"
      - name: Validate Canonical Graph
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import canonicalize_ledger, verify_hash_chain; repaired=canonicalize_ledger('data/knowledge', hash_chain=True); clean=canonicalize_ledger('data/knowledge', hash_chain=True); h=verify_hash_chain('data/knowledge'); print(repaired); print(clean); print(h); assert clean['duplicate_entities']==0 and clean['duplicate_relations']==0 and clean['dangling_relations']==0 and h['broken']==0"
      - name: Rebuild Validated Memory
        run: python src/kernel/protocol/nexus.py rebuild
      - name: Deep Ponder
        run: python src/kernel/protocol/nexus.py ponder
      - name: Run Evolution Cycle
        run: python src/kernel/protocol/nexus.py evolve
      - name: Render Human-Readable Reports
        run: python src/kernel/sensory/report_hygiene.py zero data/memories
      - name: Validate Post-Evolution Graph
        run: python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import canonicalize_ledger, verify_hash_chain; repaired=canonicalize_ledger('data/knowledge', hash_chain=True); clean=canonicalize_ledger('data/knowledge', hash_chain=True); h=verify_hash_chain('data/knowledge'); print(repaired); print(clean); print(h); assert clean['duplicate_entities']==0 and clean['duplicate_relations']==0 and clean['dangling_relations']==0 and h['broken']==0"
      - name: Rebuild Post-Evolution Memory
        run: python src/kernel/protocol/nexus.py rebuild
      - name: Final Verification
        run: python tests/run_tests.py
      - name: Sync World-Line
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          core_changes="$(git diff --name-only "$GITHUB_SHA..origin/main" | grep -Ev '^data/(memories|inputs|knowledge)/' || true)"
          if [ -n "$core_changes" ]; then
            echo "Core files changed on main while this run was active:"
            echo "$core_changes"
            exit 1
          fi
          git pull --rebase --autostash origin main
      - name: Verify Rebased World-Line
        if: github.ref == 'refs/heads/main'
        run: |
          python -c "from pathlib import Path; files=sorted(Path('src/kernel').rglob('*.py')) + sorted(Path('tests').glob('*.py')); [compile(path.read_bytes(), str(path), 'exec') for path in files]; print(f'compiled {len(files)} backend Python files')"
          python tests/run_tests.py
          python -c "import sys; sys.path.insert(0, 'src/kernel/sensory'); from document_hygiene import canonicalize_ledger, verify_hash_chain; repaired=canonicalize_ledger('data/knowledge', hash_chain=True); clean=canonicalize_ledger('data/knowledge', hash_chain=True); h=verify_hash_chain('data/knowledge'); print(repaired); print(clean); print(h); assert clean['duplicate_entities']==0 and clean['duplicate_relations']==0 and clean['dangling_relations']==0 and h['broken']==0"
          python - <<'PY'
          import subprocess

          allowed = (
              "data/memories/",
              "data/inputs/",
              "data/knowledge/",
          )
          commands = (
              ("git", "diff", "--name-only"),
              ("git", "ls-files", "--others", "--exclude-standard"),
          )
          changed = {
              path
              for command in commands
              for path in subprocess.check_output(command, text=True).splitlines()
              if path
          }
          unexpected = sorted(path for path in changed if not path.startswith(allowed))
          if unexpected:
              raise SystemExit(f"unexpected lifecycle paths: {unexpected}")
          PY
          git diff --check
      - name: Commit Cognitive Changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "lifecycle: verified cognitive update [skip ci]"
          branch: main
          file_pattern: "data/memories/** data/inputs/** data/knowledge/**"
