name: 🧬 NEXUS CORTEX Life Cycle

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    paths:
      - '.github/workflows/nexus-life-cycle.yml'
      - 'data/inputs/**'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  consciousness:
    name: 🧠 Stream of Consciousness
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Reality
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🟢 Rebuild Memory (Wake Up)
      run: python src/kernel/protocol/nexus.py rebuild

    - name: 📡 Harvest Approved External Documents
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python src/kernel/protocol/nexus.py harvest

    - name: 🧪 Validate Harvester Contracts
      run: python -m unittest discover -s tests -p test_harvester.py

    - name: 🔍 Ingest Self-Codebase (Omniscience)
      run: python src/kernel/protocol/nexus.py ingest

    - name: 🤔 Deep Ponder (Cognition)
      run: python src/kernel/protocol/nexus.py ponder

    - name: 🧬 Run Evolution Cycle (Strategy)
      run: python src/kernel/protocol/nexus.py evolve

    - name: 🧪 Verification (Tests)
      run: python tests/run_tests.py

    - name: 🔄 Sync world-line (Autostash)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase --autostash origin ${{ github.ref_name }}

    - name: 💾 Commit Cognitive Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 lifecycle: ingested, pondered & evolved"
        file_pattern: "data/memories/** data/inputs/** data/knowledge/**"
