name: 🧬 NEXUS CORTEX Life Cycle

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    paths:
      - 'docs/brain/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  consciousness:
    name: 🧠 Stream of Consciousness
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Reality
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🟢 Rebuild Memory (Wake Up)
      run: python src/kernel/nexus.py rebuild

    - name: 🔍 Ingest Self-Codebase (Omniscience)
      run: python src/kernel/nexus.py ingest

    - name: 🤔 Deep Ponder (Cognition)
      run: python src/kernel/nexus.py ponder

    - name: 🧬 Run Evolution Cycle (Strategy)
      run: python src/kernel/nexus.py evolve

    - name: Sync Origin Before Commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git stash --include-untracked
        git pull origin main --rebase
        git stash pop || true

    - name: 💾 Commit New Memories
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 lifecycle: ingested, pondered & evolved [skip ci]"
        file_pattern: "data/memories/** data/inputs/** data/knowledge/** data/*.db"
