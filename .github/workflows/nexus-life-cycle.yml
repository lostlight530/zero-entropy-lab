name: 🧬 NEXUS CORTEX Life Cycle

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    paths:
      - 'docs/brain/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  consciousness:
    name: 🧠 Stream of Consciousness
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Cleanup conflicting untracked files
      run: |
        rm -f data/inputs/.harvester_state.json
        rm -f data/inputs/archive/2026/03/ModelEngine-Group_nexent_v1.8.0.2.md
        rm -f data/memories/MISSION_ACTIVE.md
        # Just in case, remove anything generated in previous runs before checkout
        rm -rf data/inputs/archive/* || true

    - name: Checkout Reality
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🟢 Rebuild Memory (Wake Up)
      run: python src/kernel/nexus.py rebuild

    - name: 🔍 Ingest Self-Codebase (Omniscience)
      run: python src/kernel/nexus.py ingest

    - name: 🤔 Deep Ponder (Cognition)
      run: python src/kernel/nexus.py ponder

    - name: 🧬 Run Evolution Cycle (Strategy)
      run: python src/kernel/nexus.py evolve

    - name: 🔄 Sync world-line (Autostash)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase --autostash origin main

    - name: 💾 Commit Cognitive Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 lifecycle: ingested, pondered & evolved [skip ci]"
        file_pattern: "data/memories/** data/inputs/** data/knowledge/** data/*.db"
